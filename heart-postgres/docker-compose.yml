services:
  postgres:
    image: postgres:16
    container_name: heart_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: heart_pw
      POSTGRES_DB: heart_db
    ports:
      - "5432:5432"
    volumes:
      - heart_pg_data:/var/lib/postgresql/data

volumes:
  heart_pg_data:
